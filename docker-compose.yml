version: '3.11'

services:
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      - asr-redis

  celery:
    build: .
    command: ["celery", "-A", "app.celery_config.celery_app", "worker", "--loglevel=info", "--concurrency=8", "-Q", "celery,asr_queue"]
    volumes:
      - .:/asr
    depends_on:
      - asr-redis


  asr-redis:
    image: "redis:alpine"
    ports:
      - "6380:6379"
